<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pratos</title>
</head>
<body>
    <script>
        let comida = prompt("Qual opçao voce quer?");

        switch(comida){
            case "pizza":
                document.write("a opçao escolhida foi pizza");
                 break
            case "hamburguer":
                document.write("a opçao escolhida foi hamburguer");
                 break
            case "sushi":
                document.write("a opçao escolhida foi sushi");
                 break
            case "salada":
                document.write("a opçao escolhida foi salada");
                 break
            default:
                    document.write("comida nao registrada");
                    break

        }
    </script>
    
</body>
</html>
